### Notes
- See V-Dem [Faq on coder bias](https://v-dem.net/about/faq/)
- ee V-Dem [Methodology](https://v-dem.net/about/v-dem-project/methodology/)
- See Marquardt 2018

&lt;br&gt;

Essentially, each V-dem score is the result of having multiple experts in each country code the basic characteristics for that country-year.

- They then combine and weight those different scores using a model that implements Item Response Theory (IRT)

- The output is a consensus score and a 70% confidence interval which I've included in the dataset you have

&lt;br&gt;

The slide is showing you an example of the raw data fed into the model

- On the left is a figure tracking all expert codings for "political killing" in Canada since 1900 and running up to 2015.

- On the right is a table showing the consensus score for "political killing" in Canada that year and the number of experts who submitted a code.

&lt;br&gt;

What I hope you see here is a stark difference of opinion that existed across the four coders in the early 20th century of Canada.

- Competing scores of 3 and 5 that the model essentially averaged out to a 4

- Much more complicated than an average but you get the idea.
