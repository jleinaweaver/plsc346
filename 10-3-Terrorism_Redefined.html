This week we have been working to deepen our understanding of the "terrorism" concept.

- Specifically, we have been systematically collecting cases, arguments and definitions meant to help us evaluate measurements of terrorism (our work next week).

&lt;br&gt;

As a warm-up, let's talk about what has stood out for you so far

### What are the key elements of "terrorism" as you see it now?

- I appreciate Tilly's (2004) discussion of "terror" as a "recurrent strategy of intimidation"

- I apppreciate Schmid's (2003) attempt to generate academic consensus around a definition (and I like his definition even if it is rather unwieldy in practice and I'm not sure the "contexts" piece is necessary)


&lt;br&gt;

### Big substantive debates about terrorism?

- Tilly (2004) "crude typology": Can we actually generalize about terrorism if the actors who employ the terror strategy are so incredibly diverse in motivation, aims and tactics?

&lt;br&gt;

**SLIDE**: Let's apply your expertise to Jaggar's definition of terrorism.

&lt;br&gt;

#### Notes
Schmid (2011): Academic Consensus Definition
1. “Terrorism refers, on the one hand, to a doctrine about the presumed effectiveness of a special form or tactic of fear-generating, coercive political violence and, on the other hand, to a conspiratorial practice of calculated, demonstrative, direct violent action without legal or moral restraints, targeting mainly civilians and non-combatants, performed for its propagandistic and psychological effects on various audiences and conflict parties;

2. Terrorism as a tactic is employed in three main contexts: (i) illegal state repression; (ii) propagandistic agitation by non-state actors in times of peace or outside zones of conflict; and (iii) as an illicit tactic of irregular warfare employed by state- and non-state actors.”

As our segue into the Jaggar (2005) article let's start by analyzing her definition of "terrorism."

### Based on the work you've done this week, talk to me about what you learn about Jaggar's perspective on terrorism from this definition.

- *Talk in groups first then report back*

- Jaggar argues this definition has three primary benefits
    1. Terrorism Is Not a Specific Type of Conflict; Instead It Is a Tactic That May Be Employed in Various Types of Conflict and in Combination with Other Strategies of Making Claims
    2. Terrorism Should Not Be Equated with Any Particular Method of Intimidation. Terrorists Use a Variety of Methods, All of Which May Also Be Used in Contexts That Are Not Terrorist
    3. This Account Facilitates Moral Assessment

&lt;br&gt;

### Overall, do you "like" this definition? Does it compare favorably to the consensus definition in Schmid (2023)? Or to Tilly's (2004) four steps?

### What is the context behind this picture? What does this refer to?
- (US view of the Taliban in Afghanistan)
    - 1985 fighting the soviets = Good guys!
    - 2005 fighting the US = bad guys!

&lt;br&gt;

### What does this dichotomy ask us to remember when discussing "terrorism"?

"One person’s terrorist is another person’s freedom fighter"

&lt;br&gt;

I think of this as a reminder to never forget the subjective nature of the act.

- No one thinks of themselves as the bad guy in their own story.

&lt;br&gt;

This matters for thinking about terrorism as a strategy to achieve some specific end

- Every person, even those using terror as a strategy, has lines they will not cross,

- Every person, even a "terrorist", has some justification or rationalization for their behavior.

### What does this tell us about terror as a strategy?
1. Even weak groups can achieve terrifying ends if they are sufficiently committed to their cause.

2. Because "terror" violates norms, it carries more weight than other acts of violence

&lt;br&gt;

In this sense, terrorism is not crazy and it is not definitionally "crazy."

- Terrorists are "terrorists" at least in part because they are violating the norms in a society AND this willingness to violate those norms gives the actions greater substantive weight

All of this concern about context, perspective and the subjectivity of "terrorism" leads us up to Jagger's criteria for a morally permissible form of terror.

&lt;br&gt;

### Are we clear on these? Any that need clarification?

1. Just cause. For terrorism to be morally permissible, a necessary though certainly not sufficient condition is that it must be intended to secure people’s most basic rights.

2. Competent authority. Early versions of just war theory limited permissible uses of force to those authorized by public authorities, a statist bias that made it impossible to justify uprisings against those authorities. Current international law recognizes rebel movements as having “belligerent status” if they control their territory but even this might-makes-right criterion may be too stringent since many rebel movements, especially in their early stages, are
too weak to control the territory in which they operate, at least by day (Lackey 1989, 29–31). The question of when terrorists may legitimately claim to represent some oppressed population is difficult to answer, both in principle and in practice, although some indication may be provided by the extent of popular protest or rejoicing over terrorist acts.

3. Right intention. For their conduct to have a chance of being justified, terrorists must be convinced that all of the conditions necessary to justifying a war must be met. If terrorists are able to choose whether or not to participate in terrorist activity while military personnel are conscripted, then their subjective beliefs are even more important to assessing the conduct of terrorists than to assessing the conduct of official military personnel.

4. Proportionality. The use of force is justified in traditional just war theory only if the overall good it achieves is greater than the harm it causes. Since terrorism is even more atrocious than war, for reasons given above, the cause of the terrorist must be overwhelming in its righteousness. Only massive and systematic violations of human rights, not small injustices, could ever begin to justify the adoption of terrorist tactics and use of these tactics must be kept to a minimum, in terms of both quantity and quality.

5. Last resort. Terrorist tactics must be a last resort. All other means of remedying the perceived injustice, including conventional warfare, must be unavailable or have failed.

6. Reasonable hope of success. Those waging a just war must have a reasonable hope of success in achieving their ends. Because terrorism is so reprehensible, it seems plausible to insist that terrorism can be justified only when the hope of success is much more certain than required to justify war.

7. The aim of peace. Like a just war, any justified terrorism should aim at a just peace.

Even Jaggar (2005) argues that her definition makes clear terrorism is morally repugnant (p212)

1. First, terrorism is morally repugnant because terrorists engage in coercion and intimidation, which are regarded ordinarily as morally wrong.

2. Second, terrorism is morally repugnant because terrorists harm or threaten those who have not harmed them and do not threaten them, people who can in no way be said to deserve the harm.
