???

For today I assigned you an intriguing argument that I think holds and connects MANY of the political violence arguments from our class into one.

&lt;br&gt;

Arguments like:

- Tilly's work on politics and varieties of collective violence,

- Freedman's work on violence as a strategic act,

- The debate between Weber and Olson over the nature and use of violence by states against their citizens,

- The constraints against violence that vary by regime type and institutions,

- The capacity of small groups to use threats and violence to influence wider populations, and

- The power of information and the internet to forge identities and overcome collective action problems.

&lt;br&gt;

All of this and more is here in this single article!

- Pretty good, right?
