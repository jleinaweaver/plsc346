.center[**Collins (2021) "A New Wave of Terrorism? A Comparative Analysis of the Rise of Far-Right Terrorism"**]]

???

Last class we examined Collins (2021) who made the argument Far Right Terrorism (FRT) represents the next "wave" of global terrorism

&lt;br&gt;

### First, what does that mean?

### - What is a "wave" of terrorism?

- David Rapoport’s Modern Waves of Terrorism Theory

- Waves identify "motivations, targets, weapon types, group belongings, ideologies, and reoccurring patterns" that help us understand and, hopefully, address the rise of terrorism

- “The Four Waves of Modern Terrorism” defines a wave as a cycle that takes place over a 40-year time period. Each cycle is dynamic in that it expands and contracts.

- Groups within a particular wave adapt to the exigencies of their time, are aware of the actions of other contemporary terrorist groups in other countries, and are driven by a relentless energy that propels them into violent action. They share a common technological facility, including communications, weaponry, and logistics. Most important, they share a vision that perceives in the ills and abuses of the world the seeds of a revolutionary future.

&lt;br&gt;

### Did Collins convince you that FRT is the next "wave"? Why or why not?

- Used GTD data to select cases

- Mixed-methods case studies: Germany, US, UK and Scandinavia

- FRT groups have common "type", "prompting cause" and a "common predominant energy"

#### NOTES
Inclusion Criteria (p8-9)

Summary: In order to be eligible for inclusion, each individual must meet one of the following five criteria:
1. the individual was arrested;
2. the individual was indicted of a crime;
3. the individual was killed as a result of his or her ideological activities;
4. the individual is/was a member of a designated terrorist organization; or
5. the individual was associated with an extremist organization whose leader(s) or founder(s) has/have been indicted of an ideologically motivated violent offense.

In addition, each individual MUST:
1. have been radicalized in the United States,
2. have espoused or currently espouse ideological motives, and
3. show evidence that his or her behaviors are/were linked to the ideological motives he or she espoused/espouses.
