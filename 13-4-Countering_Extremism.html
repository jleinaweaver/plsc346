.center[.size50[.textwhite[**Why is countering far-right extremism in the United States so difficult?**]]]

???

Small groups, use the reading to make a list that answers this question

- Get ready to report back!

&lt;br&gt;

*ON BOARD*
1. deep-seated ideological roots
    - Though organisationally diverse, these components of the movement are largely motivated by the same three ideological tenets: mistrust of federal authority, fear of foreign influence, and the need for paramilitary self-defence.
    - Many of the core beliefs of the anti-government far-right are deeply rooted in American history.

2. fluid organisational structure
    - Three types of organisational structures dominate: self-identified followings, local groups and clusters, and national organisations.
    - Individual members possess significant autonomy and can belong to multiple movements and organisations at once.

3. mix of violent and nonviolent tactics
    - Most follower actions are relatively nonviolent. 
    - For example, some extremists use “paper terrorism”—the filing of frivolous liens, lawsuits, and false financial claims—to overburden the federal government, drain financial resources, and clog court dockets.
    - Anti-government groups also regularly participate in legal public events, assemblies, and protests, including school board meetings and political elections.
    - To the extent that anti-government extremist tactics involve the explicit use of force, they typically revolve around acts of political intimidation or low-level violence targeting ideological opponents.
    - HOWEVER, Anti-government extremist violence has the potential to escalate into a broader and more indiscriminate conflict. Generalised acceptance of the legitimacy of violence can inspire attempts at vigilante justice, such as the 2020 Wolverine Watchmen militia plot to kidnap Michigan Governor Gretchen Witmer.

#### NOTES
- Why is this strand of anti-government extremism so dangerous and challenging to combat?
- We argue that the far-right anti-government movement’s deep-seated ideological roots, fluid organisational structure, and mix of violent and nonviolent tactics make it difficult to proscribe, prosecute, and ultimately eliminate.
- Ideological roots: Though organisationally diverse, these components of the movement are largely motivated by the same three ideological tenets: mistrust of federal authority, fear of foreign influence, and the need for paramilitary self-defence.
- Many of the core beliefs of the anti-government far-right are deeply rooted in American history. America’s rebellious origins nurtured a cultural tradition of questioning authority, protecting individual freedoms, and resisting perceived tyranny.
- While successful in preventing additional mass-causality violence, law enforcement efforts did not root out anti-government extremism entirely. Elements of the movement continued to operate in the United States and engage in actions—such as organising large-scale meetings and paramilitary training sessions—that fell short of criminal activity.
- Three types of organisational structures dominate: self-identified followings, local groups and clusters, and national organisations.
- Even among these more structured anti-government groups, organisational identities and ties can be highly fluid.  Individual members possess significant autonomy and can belong to multiple movements and organisations at once. A group member can, on their own initiative, choose to attend public rallies, meetings, and training camps with other like-minded individuals who may or may not share their same organisational identity. This individual autonomy facilitates the formation of “loose ties” among followers and unsystematic relationships between groups. 
- Most follower actions are relatively nonviolent. For example, some extremists use “paper terrorism”—the filing of frivolous liens, lawsuits, and false financial claims—to overburden the federal government, drain financial resources, and clog court dockets.36 Anti-government groups also regularly participate in legal public events, assemblies, and protests, including school board meetings and political elections.
- To the extent that anti-government extremist tactics involve the explicit use of force, they typically revolve around acts of political intimidation or low-level violence targeting ideological opponents.
- Anti-government extremist violence has the potential to escalate into a broader and more indiscriminate conflict. Generalised acceptance of the legitimacy of violence can inspire attempts at vigilante justice, such as the 2020 Wolverine Watchmen militia plot to kidnap Michigan Governor Gretchen Witmer.4

.center[.size55[.textwhite[**What do we do about it?**]]]

???

Small groups, use the reading to make a list that answers this question

- Get ready to report back!

&lt;br&gt;

*ON BOARD*
- Hope that members "use violence in shockingly reprehensible ways"?
    - Unsanctioned or morally transgressive violence can undermine the movement’s ability to retain existing members, attract new followers, raise funds, and remain a viable threat.
    
- Develop informers!
    - Informers are a constant risk, even in an environment dominated by anonymous social media. Members can come to suspect each other’s loyalty and render the movement vulnerable to fragmentation, splintering, and infighting. Law enforcement can infiltrate local or national groups or co-opt existing members to become informants
    
- Moving forward, US officials should look to the experiences of other democratic states facing similar anti-government threats.
    - Examples of the UK and Germany banning or proscribing ant-government groups although to mixed effect: The group organizations were eliminated but not the member dynamics or ideological roots. Plus, members just shifted elsewhere.

&lt;br&gt;

### What do we think of these suggestions? 

### - Is one of these the way forward or not?


&lt;br&gt;

#### NOTES
What do the authors suggest is our best way forward?
- Decentralisation can be a disadvantage as well as an advantage. By advocating a big tent ideology and encouraging individuals to carry out stochastic acts of violence, or inspired individual acts of terrorism, such networks can attract a wide and unvetted range of followers. Lack of control from the top can create a moral hazard if followers use violence in shockingly reprehensible ways.

- Unsanctioned or morally transgressive violence can undermine the movement’s ability to retain existing members, attract new followers, raise funds, and remain a viable threat.

- Another weakness results from the poor cohesion and mistrust among the rank and file. Informers are a constant risk, even in an environment dominated by anonymous social media. Members can come to suspect each other’s loyalty and render the movement vulnerable to fragmentation, splintering, and infighting. Law enforcement can infiltrate local or national groups or co-opt existing members to become informants

- Moving forward, US officials should look to the experiences of other democratic states facing similar anti-government threats. In response to the proliferation of violent far-right groups, several democracies have begun developing tools to proscribe these organisations—a process that the United States currently lacks
